spring:
  datasource:
    url: jdbc:h2:mem:library
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  model: deepseek-chat
  temperature: 0.1
  base-url: https://api.deepseek.com

server:
  port: 8080
