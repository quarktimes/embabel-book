spring:
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
      chat:
        options:
          model: deepseek-chat
  datasource:
    url: jdbc:h2:mem:library
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

embabel:
  models:
    default-llm: deepseek-chat

server:
  port: 8080
